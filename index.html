<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepet Hesaplama Uygulaması</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        h2 {
            color: #d32f2f;
        }

        .urun-kutu {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .indirim-mesaj {
            color: #388e3c;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <script>

        let urunSayisi = prompt("Lütfen sepete eklemek istediğiniz farklı ürün çeşidi sayısını giriniz:");
        urunSayisi = Number(urunSayisi);

        let sepetToplami = 0;
        let ciktilar = "";

        if (!isNaN(urunSayisi) && urunSayisi > 0) {

            for (let i = 0; i < urunSayisi; i++) {


                let urunAdi = prompt((i + 1) + ". Ürünün adını giriniz:");


                let fiyat;
                do {
                    fiyat = prompt(urunAdi + " ürününün fiyatını giriniz:");

                    fiyat = parseFloat(fiyat);


                    if (fiyat <= 0 || isNaN(fiyat)) {
                        alert("Hata: Ürün fiyatı 0 veya 0'dan küçük olamaz ve geçerli bir sayı olmalıdır!");
                    }
                }
                while (fiyat <= 0 || isNaN(fiyat));


                let adet;
                do {
                    adet = prompt(urunAdi + " ürününden kaç adet alınacağını giriniz:");

                    adet = Number(adet);


                    if (adet < 1 || isNaN(adet)) {
                        alert("Hata: Ürün adedi 1'den küçük olamaz ve geçerli bir sayı olmalıdır!");
                    }
                }
                while (adet < 1 || isNaN(adet));


                let urunToplam = fiyat * adet;
                sepetToplami += urunToplam;


                ciktilar += "<div class='urun-kutu'>";
                ciktilar += "Fiyatı " + fiyat + " TL olan " + urunAdi + "’dan " + adet + " adet alındı.<br>";
                ciktilar += "Toplam bedel: <strong>" + urunToplam + " TL</strong>";
                ciktilar += "</div>";
            }


            document.write("<h2>Ürün Detayları</h2>");
            document.write(ciktilar);


            document.write("<h3>İndirimsiz Sepet Toplamı: " + sepetToplami + " TL</h3>");

            let indirimliSepetToplami = sepetToplami;


            document.write("<h3>İndirim Durumu:</h3>");
            if (sepetToplami >= 1000) {
                indirimliSepetToplami = sepetToplami - (sepetToplami * 0.10);
                document.write("<p class='indirim-mesaj'>Sipariş tutarınız 1000 TL ve üzeri olduğu için %10 indirim uygulandı.</p>");
            }
            else if (sepetToplami >= 500 && sepetToplami <= 999) {
                indirimliSepetToplami = sepetToplami - (sepetToplami * 0.05);
                document.write("<p class='indirim-mesaj'>Sipariş tutarınız 500 - 999 TL arasında olduğu için %5 indirim uygulandı.</p>");
            }
            else {
                document.write("<p>Tutar 500 TL altında olduğu için indirim uygulanmamıştır.</p>");
            }


            document.write("<h2>İndirimli Ödenecek Toplam Tutar: " + indirimliSepetToplami + " TL</h2>");

        } else {
            document.write("<p>Geçerli bir ürün çeşidi sayısı girmediniz.</p>");
        }
    </script>

</body>

</html>
